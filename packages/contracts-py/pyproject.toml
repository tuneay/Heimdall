[project]
name = "heimdall-contracts"
version = "0.1.0"
description = "Heimdall paylaşılan veri kontratları (Pydantic v2) — kanonik şema"
requires-python = ">=3.12"
dependencies = ["pydantic>=2.7"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["heimdall_contracts"]
